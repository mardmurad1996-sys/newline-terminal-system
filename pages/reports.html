<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>ڕاپۆرتەکانی ڕۆژانە</title>
    <link rel="stylesheet" href="../css/style.css">
</head>
<body>
    <nav class="navbar">
        <div class="nav-brand">تێرمینال</div>
        <div class="nav-links">
            <a href="../index.html">دەشبۆرد</a>
            <a href="new-trip.html">ڕۆیشتنی نوێ</a>
            <a href="active-trips.html">ڕۆیشتنە چالاکەکان</a>
            <a href="history.html">مێژووی ڕۆیشتنەکان</a>
            <a href="drivers.html">شۆفێرەکان</a>
            <a href="reports.html" class="active">ڕاپۆرتەکان</a>
        </div>
        <div class="nav-time" id="clock">--:--:--</div>
    </nav>

    <div class="container">
        <div class="page-header">
            <h1>ڕاپۆرتەکانی ڕۆژانە</h1>
        </div>

        <div class="form-card">
            <div style="display: flex; gap: 10px; align-items: center; flex-wrap: wrap;">
                <label for="report-date">بەرواری دیاری بکە:</label>
                <input type="date" id="report-date" />
                <button onclick="loadReport()" class="btn-primary">بارکردن</button>
                <button onclick="window.print()" class="btn-secondary">چاپکردن</button>
            </div>
            <div id="report-date-title" style="margin-top: 15px; font-weight: bold; text-align: center;"></div>
        </div>

        <div class="table-card">
            <table>
                <thead>
                    <tr>
                        <th>جۆری سەرڤیس</th>
                        <th>ژمارەی ڕۆیشتنە</th>
                        <th>ژمارەی گەشتیاران</th>
                        <th>کۆی بڕی پارە</th>
                    </tr>
                </thead>
                <tbody id="report-body">
                    <tr>
                        <td colspan="4" style="text-align: center; padding: 20px;">داتای بارکراودەدات...</td>
                    </tr>
                </tbody>
            </table>
        </div>
    </div>

    <script src="../js/reports.js"></script>
</body>
</html>
