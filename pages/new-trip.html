<!DOCTYPE html><html dir="rtl"><head><meta charset="UTF-8"><title>New Trip</title><link rel="stylesheet" href="../css/style.css"></head><body><nav class="navbar"><div class="nav-brand">Terminal</div><div class="nav-links"><a href="../index.html">Dashboard</a><a href="new-trip.html">New Trip</a><a href="active-trips.html">Active Trips</a><a href="history.html">History</a><a href="drivers.html">Drivers</a><a href="reports.html">Reports</a></div><div class="nav-time" id="clock">--:--:--</div></nav><div class="container"><div class="page-header"><h1>New Trip</h1></div><div class="form-card"><h2>Select Service Type</h2><div class="btn-group"><button class="btn btn-warning" onclick="setType(this,'City Taxi')">City Taxi</button><button class="btn btn-primary" onclick="setType(this,'Long Distance')">Long Distance</button><button class="btn btn-success" onclick="setType(this,'Bus')">Bus</button></div></div><div class="form-card" id="trip-form" style="display:none"><h2 id="form-title">Trip Details</h2><div class="form-grid"><div class="form-group"><label>Driver Name</label><input type="text" id="driver-name" oninput="searchDriver(this.value)"><div class="suggest-box" id="driver-suggest" style="display:none"></div></div><div class="form-group"><label>Phone</label><input type="text" id="driver-phone"></div><div class="form-group"><label>Car Number</label><input type="text" id="driver-car"></div><div class="form-group"><label>From</label><input type="text" id="route-from"></div><div class="form-group"><label>To</label><input type="text" id="route-to"></div><div class="form-group"><label>Fare IQD</label><input type="number" id="fare"></div></div><div class="btn-group"><button class="btn btn-success" onclick="startTrip()">Start Trip</button><button class="btn btn-danger" onclick="resetForm()">Clear</button></div></div><div class="form-card" id="passenger-section" style="display:none"><h2>Add Passengers</h2><div id="bus-bulk" style="display:none"><textarea id="bulk-text" rows="8" style="width:100%;padding:12px;border:2px solid #e5e7eb;border-radius:10px" placeholder="Name - Passport"></textarea><br><button class="btn btn-success" onclick="addBulkPassengers()">Add All</button></div><div id="single-passenger"><div class="form-group"><label>Passenger Name</label><input type="text" id="pax-name"></div><div class="form-group"><label>Passport</label><input type="text" id="pax-passport"></div><div class="btn-group"><button class="btn btn-primary" onclick="addPassenger()">Add Passenger</button><button class="btn btn-success" onclick="finishTrip()">Finish Trip</button></div></div><div class="passenger-list" id="passenger-list"></div></div></div><script src="../js/receipt.js"></script><script src="../js/new-trip.js"></script></body></html>
