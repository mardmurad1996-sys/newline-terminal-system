<html><head><title>Login - Project Guardian</title><link rel='stylesheet' href='css/style.css'></head><body style='display:flex;justify-content:center;align-items:center;height:100vh'> <div style='border:2px solid #FFD700;padding:40px;text-align:center'> <h1>Security Portal</h1> <input id='user' placeholder='Username' style='display:block;width:100%;margin-bottom:10px'> <input id='pass' type='password' placeholder='Password' style='display:block;width:100%;margin-bottom:20px'> <button onclick='doLogin()' style='width:100%'>Access System</button> <p id='msg' style='color:red'></p> </div> <script>function doLogin(){ if(document.getElementById('user').value==='admin' && document.getElementById('pass').value==='1234'){ sessionStorage.setItem('isLogged', 'true'); window.location.href='index.html'; }else{ document.getElementById('msg').innerText='Access Denied'; }}</script></body></html>
