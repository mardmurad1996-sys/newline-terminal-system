<html><head><title>Driver Management</title><link rel='stylesheet' href='css/style.css'></head><body><nav><a href='index.html'>Trips Dashboard</a> | <a href='drivers.html'>Driver Management</a> | <button onclick='sessionStorage.clear();window.location.href='login.html'' style='background:#d9534f;color:white;margin-right:10px;padding:5px 10px;border:none;cursor:pointer;border-radius:4px'>Logout</button></nav><h1>Driver Management</h1><div style='border:1px solid #FFD700;padding:15px;margin-bottom:20px'><h3>Register New Driver</h3><input id='dName' placeholder='Driver Name'> <input id='dLic' placeholder='License Number'> <button onclick='addDriver()'>Add Driver</button></div><table id='driversTable'><tr><th>ID</th><th>Name</th><th>License</th></tr></table><script>function addDriver(){const n=document.getElementById('dName').value;const l=document.getElementById('dLic').value;fetch('http://localhost:3000/drivers',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({name:n,license:l})}).then(()=>location.reload())}fetch('http://localhost:3000/drivers').then(r=>r.json()).then(data=>{const t=document.getElementById('driversTable');data.forEach(d=>{const r=t.insertRow();r.innerHTML=\<td>\</td><td>\</td><td>\</td>\;})})</script></body></html>
