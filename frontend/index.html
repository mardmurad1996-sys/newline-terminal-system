<html><head><title>Trip Dashboard</title><style>body{font-family:sans-serif;padding:40px;background:#f4f7f6}table{width:100%;border-collapse:collapse;background:#fff}th,td{padding:12px;border:1px solid #ddd;text-align:left}th{background:#d9534f;color:#fff}button{background:#d9534f;color:white;border:none;padding:5px 10px;cursor:pointer;border-radius:3px}</style></head><body><h1>Project Guardian: Trip Monitor</h1><table id='tripsTable'><tr><th>ID</th><th>Destination</th><th>Status</th><th>Action</th></tr></table><script>function deleteTrip(id){fetch('http://localhost:3000/trips/'+id,{method:'DELETE'}).then(()=>location.reload())}fetch('http://localhost:3000/trips').then(r=>r.json()).then(data=>{const t=document.getElementById('tripsTable');data.forEach(trip=>{const r=t.insertRow();r.innerHTML=\<td>\</td><td>\</td><td>\</td><td><button onclick='deleteTrip(\)'>Delete</button></td>\;})})</script></body></html>
