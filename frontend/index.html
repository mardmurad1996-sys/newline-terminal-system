<script>if(sessionStorage.getItem('isLogged')!=='true'){window.location.href='login.html'}</script><html><head><title>Trip Dashboard</title><link rel='stylesheet' href='css/style.css'></head><body><nav class='no-print'><a href='index.html'>Trips Dashboard</a> | <a href='drivers.html'>Driver Management</a> | <button onclick='sessionStorage.clear();window.location.href='login.html'' style='background:#d9534f;color:white;margin-right:10px;padding:5px 10px;border:none;cursor:pointer;border-radius:4px'>Logout</button></nav><h1>Project Guardian: Trip Monitor</h1><div class='no-print' style='border:1px solid #FFD700;padding:15px;margin-bottom:10px'><h3>Add New Trip</h3><input id='dest' placeholder='Destination'> <input id='stat' placeholder='Status'> <select id='driverSelect'><option value=''>Select Driver</option></select> <button onclick='addTrip()'>Add Trip</button></div><div class='no-print' style='margin-bottom:20px;display:flex;gap:10px'><input type='text' id='searchInput' onkeyup='filterTable()' placeholder='Search trips...' style='flex-grow:1;padding:10px;border:2px solid #FFD700;background:#001f3f;color:#FFD700'> <button onclick='window.print()' style='background:#28a745;color:white'>Print Report</button></div><table id='tripsTable'><thead><tr><th>ID</th><th>Destination</th><th>Status</th><th>Driver</th></tr></thead><tbody id='tripsBody'></tbody></table><style>@media print{.no-print{display:none}body{background:white;color:black}table,th,td{border:1px solid black;color:black}th{background:#eee}}</style><script>fetch('http://localhost:3000/drivers').then(r=>r.json()).then(data=>{const s=document.getElementById('driverSelect');data.forEach(d=>{s.innerHTML+=\<option value='\'>\</option>\;})});function addTrip(){fetch('http://localhost:3000/trips',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({destination:document.getElementById('dest').value,status:document.getElementById('stat').value,driverId:document.getElementById('driverSelect').value})}).then(()=>location.reload())}function filterTable(){const input=document.getElementById('searchInput').value.toLowerCase();const rows=document.querySelectorAll('#tripsBody tr');rows.forEach(row=>{const text=row.innerText.toLowerCase();row.style.display=text.includes(input)?'':'none'})}fetch('http://localhost:3000/trips').then(r=>r.json()).then(data=>{const b=document.getElementById('tripsBody');data.forEach(trip=>{const r=b.insertRow();r.innerHTML=\<td>\</td><td>\</td><td>\</td><td>\</td>\;})})</script></body></html>
